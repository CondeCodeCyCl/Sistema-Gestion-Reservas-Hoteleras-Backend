spring:
  application:
    name: gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9000/oauth2/jwks
  cloud:
    loadbalancer:
      enabled: true
    gateway:
      server:
        webflux:
          routes:
            - id: huespedes-msv
              uri: lb://huespedes-msv
              predicates:
                - Path=/api/huespedes/**
              filters:
                - StripPrefix=2
            - id: habitaciones-msv
              uri: lb://habitaciones-msv
              predicates:
                - Path=/api/habitaciones/**
              filters:
                - StripPrefix=2
            - id: reservas
              uri: lb://reservas
              predicates:
                - Path=/api/reservas/**
              filters:
                - StripPrefix=2
            - id: usuarios-msv
              uri: lb://usuarios-msv
              predicates:
                - Path=/api/usuarios/**
              filters:
                - StripPrefix=2
server:
  port: 8090
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka