<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex justify-content-center align-items-center vh-100" style="background: linear-gradient(135deg, #f0f4f8, #d9e2ec);">

  <form th:action="@{/login}" method="post" class="p-5 bg-white rounded-4 shadow-lg" style="width: 450px; max-width: 90%; font-size: 1.1rem;">
    
    <h3 class="mb-5 text-center fw-bold text-primary">Iniciar Sesión</h3>
    
    <div th:if="${param.error}" class="alert alert-danger text-center fw-semibold mb-4">
        Credenciales inválidas
    </div>
    
    <div class="mb-4">
      <label for="username" class="form-label fw-semibold">Usuario</label>
      <input name="username" id="username" 
             type="text" class="form-control form-control-lg" placeholder="Usuario" required />
    </div>
    
    <div class="mb-4">
      <label for="password" class="form-label fw-semibold">Contraseña</label>
      <input name="password" id="password" 
             type="password" class="form-control form-control-lg" placeholder="Contraseña" required />
    </div>
    
    <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm" 
            style="font-weight: 600; letter-spacing: 0.05em; transition: background-color 0.3s ease;">
      Iniciar Sesión
    </button>
    
  </form>

</body>
</html>
